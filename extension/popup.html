<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 220px;
      padding: 16px;
      background: #0e0e0e;
      color: #d4d4d4;
      font-family: monospace;
      margin: 0;
    }
    h2 {
      color: #e03f3f;
      margin: 0 0 8px;
      font-size: 16px;
    }
    p {
      font-size: 12px;
      color: #666;
      margin: 6px 0;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #4caf50;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .note {
      margin-top: 12px;
      color: #444;
      font-size: 11px;
      border-top: 1px solid #222;
      padding-top: 10px;
    }
  </style>
</head>
<body>
  <h2>🛡 TOXISCOPE</h2>
  <p><span class="dot"></span>Extension Active</p>
  <p>Analyzing comments on YouTube & Twitter in real time.</p>
  <p class="note">⚠️ Make sure backend is running on port 8000</p>
</body>
</html>
